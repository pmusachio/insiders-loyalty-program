services:

  train:
    build: .
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
    command: >
      sh -c "
        python -m insiders_loyalty_program.cli train &&
        python scripts/export_clusters_to_sqlite.py
      "
    profiles: [train]

  api:
    build: .
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
    ports:
      - "8000:8000"
    command: uvicorn insiders_loyalty_program.api:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
